          sequence:
            - condition: state
              entity_id: light.living_room_ceiling_light
              state: "off"
            - target:
                entity_id: light.living_room_ceiling_light
              data:
                brightness_pct: 70
                color_temp_kelvin: 4000
              action: light.turn_on
        - conditions:
            - condition: template
              value_template: "{{ states('sensor.living_room_presence_sensor') | lower
                in ['clear', 'none'] }}

                "
            - condition: template
              value_template: "{{ states('sensor.human_motion_state') | lower in ['off',
                'no_motion', 'inactive', 'clear'] }}

                "
          sequence:
            - delay: 00:03:00
            - condition: template
              value_template: "{{ states('sensor.living_room_presence_sensor') | lower
                in ['clear', 'none'] }}

                "
            - condition: template
              value_template: "{{ states('sensor.human_motion_state') | lower in ['off',
                'no_motion', 'inactive', 'clear'] }}

                "
            - target:
                entity_id: light.living_room_ceiling_light
              action: light.turn_off
      default: []
  mode: restart
