- id: "1774111653387"
  alias: Entrance Ambiance Light
  description: Turn on from 5 PM to 8 PM when home
  triggers:
    - trigger: time
      at: "17:00:00"
    - trigger: time
      at: "20:00:00"
  conditions:
    - condition: state
      entity_id: device_tracker.bhavyas_iphone
      state: home
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ now().strftime('%H:%M:%S') == '17:00:00' }}"
          sequence:
            - target:
                entity_id: switch.entrance_ambiance_light
              action: switch.turn_on
        - conditions:
            - condition: template
              value_template: "{{ now().strftime('%H:%M:%S') == '20:00:00' }}"
          sequence:
            - target:
                entity_id: switch.entrance_ambiance_light
              action: switch.turn_off
  mode: single
