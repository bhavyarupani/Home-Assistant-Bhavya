repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]
        files: ^(src/|\.github/).*\.(ya?ml)$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^(src/|\.github/).*\.(ya?ml|json|md)$

  - repo: local
    hooks:
      - id: forbidden-tracked-files
        name: Forbidden tracked files
        entry: python3 scripts/check_forbidden_files.py
        language: system
        pass_filenames: false
        always_run: true

      - id: ha-reference-validation
        name: Home Assistant reference validation
        entry: python3 scripts/validate_ha_references.py
        language: system
        pass_filenames: false
        files: \.(ya?ml|txt|py)$
